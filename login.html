<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodGo Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* ===== BACKGROUND ===== */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

/* ===== LOGIN CARD ===== */

.card{
background:white;
padding:40px;
width:360px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.3);
text-align:center;
}

/* ===== TITLE ===== */

.card h2{
color:#ff5722;
margin-bottom:5px;
}

.subtitle{
font-size:13px;
color:#777;
margin-bottom:20px;
}

/* ===== INPUT GROUP ===== */

.input-group{
position:relative;
margin-bottom:15px;
}

.input-group input,
.input-group select{
width:100%;
padding:12px 15px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

/* ===== BUTTON ===== */

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#ff9800,#ff5722);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* ===== REGISTER LINK ===== */

.footer{
margin-top:15px;
font-size:14px;
}

.footer a{
color:#ff5722;
text-decoration:none;
font-weight:500;
}

</style>
</head>

<body>

<div class="card">

<h2>🍔 FoodGo</h2>
<p class="subtitle">Welcome back! Login to continue</p>

<form method="POST">

<div class="input-group">
<input type="email" name="email" placeholder="📧 Email" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="🔒 Password" required>
</div>

<div class="input-group">
<select name="role" required>
<option value="">👤 Login As</option>
<option value="customer">Customer</option>
<option value="restaurant">Restaurant</option>
<option value="delivery">Delivery</option>
<option value="admin">Admin</option>
</select>
</div>

<button type="submit">🚀 Login</button>

</form>

<div class="footer">
New here? <a href="/register">Create Account</a>
</div>

</div>

</body>
</html>
