<!DOCTYPE html>
<html>
<head>
<title>Delivery Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
background:linear-gradient(135deg,#cfe8d5,#b4d3b8);
min-height:100vh;
}

/* NAVBAR */

.navbar{
height:65px;
background:#2e7d32;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
color:white;
font-size:18px;
font-weight:600;
}

.logout{
background:#4caf50;
color:white;
padding:6px 15px;
border-radius:15px;
text-decoration:none;
font-size:14px;
}

/* CARD */

.container{
width:55%;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

/* TITLE */

.title{
text-align:center;
font-size:22px;
color:#2e7d32;
margin-bottom:20px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#43a047;
color:white;
padding:12px;
text-align:center;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #eee;
}

/* RESTAURANT BADGE */

.badge{
background:#dcedc8;
color:#33691e;
padding:4px 12px;
border-radius:12px;
font-size:12px;
}

/* DELIVERED BUTTON */

.delivered{
background:#2e7d32;
color:white;
border:none;
padding:6px 16px;
border-radius:18px;
cursor:pointer;
}

.delivered:hover{
background:#1b5e20;
}

</style>

</head>

<body>

<div class="navbar">
🚚 FoodGo Delivery Panel
<a href="/logout" class="logout">Logout</a>
</div>

<div class="container">

<div class="title">📦 Orders to Deliver</div>

<table>

<tr>
<th>ID</th>
<th>Restaurant</th>
<th>Food</th>
<th>Address</th>
<th>Action</th>
</tr>

{% for o in orders %}

<tr>

<td>#{{o.id}}</td>

<td>
<span class="badge">Hot & Spicy</span>
</td>

<td>{{o.food_name}}</td>

<td>{{o.address}}</td>

<td>

<a href="/delivered/{{o.id}}">
<button class="delivered">☑ Delivered</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
